<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>WMS Smart Packing V14</title>
  
  <script src="https://cdn.tailwindcss.com"></script>

  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.344.0?deps=react@18.2.0"
      }
    }
  </script>

  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-100 overflow-hidden">
  
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useRef } from 'react';
    import { createRoot } from 'react-dom/client';
    import { 
      LayoutGrid, Play, AlertCircle, Menu, X, GripHorizontal, Box, Layers, GripVertical, Plus, 
      Settings, XCircle, ArrowRight, ArrowLeft, ArrowDown, CheckSquare, Square, Info, Activity, 
      FileSpreadsheet, UploadCloud, TableProperties, RefreshCw, Save, Download, Upload, 
      MousePointerClick, ChevronRight 
    } from 'lucide-react';

    // --- HẰNG SỐ & MÀU SẮC ---
    const PRIORITIES = {
      HARD: { id: 'HARD', label: '1. Đáy', bg: 'bg-red-50', text: 'text-red-700', border: 'border-red-500' },
      SOFT: { id: 'SOFT', label: '2. Giữa', bg: 'bg-yellow-50', text: 'text-yellow-700', border: 'border-yellow-500' },
      NORMAL: { id: 'NORMAL', label: '3. Nóc', bg: 'bg-green-50', text: 'text-green-700', border: 'border-green-500' }
    };

    const BATCH_COLORS = [
      { main: '#3B82F6', top: '#60A5FA', right: '#2563EB', text: 'text-white' }, 
      { main: '#EF4444', top: '#F87171', right: '#DC2828', text: 'text-white' }, 
      { main: '#10B981', top: '#34D399', right: '#059669', text: 'text-white' }, 
      { main: '#F59E0B', top: '#FBBF24', right: '#D97706', text: 'text-white' }, 
      { main: '#8B5CF6', top: '#A78BFA', right: '#7C3AED', text: 'text-white' }, 
      { main: '#EC4899', top: '#F472B6', right: '#DB2777', text: 'text-white' }, 
      { main: '#14B8A6', top: '#2DD4BF', right: '#0D9488', text: 'text-white' }, 
    ];

    const CATEGORIES = ['Đạn thẳng', 'Đạn cối', 'Vật liệu nổ', 'Khác'];

    const STORAGE_KEY = 'wms_smartpacking_data_v14';

    function SmartPackingApp() {
      // --- STATE KHỞI TẠO ---
      const [activeTab, setActiveTab] = useState('batches');
      const [viewMode, setViewMode] = useState('3D');
      const [isSidebarOpen, setIsSidebarOpen] = useState(window.innerWidth >= 768);
      
      const [draggedItemIndex, setDraggedItemIndex] = useState(null);
      const [editingBatch, setEditingBatch] = useState(null);
      
      const [hoveredBatchId, setHoveredBatchId] = useState(null);
      const [selectedBatch, setSelectedBatch] = useState(null);

      const [config, setConfig] = useState({
        rows: 4, cols: 6, maxHeight: 10, defaultItemsPerBox: 2,
        isManualRouting: false, fillAxis: 'col', fillDirection: 'ltr', isSnakeRouting: true
      });
      const [autoChosenConfig, setAutoChosenConfig] = useState(null);

      const [batches, setBatches] = useState([
        { id: 'L01', name: 'Đạn CX57', category: 'Đạn thẳng', totalItems: 48, itemsPerBox: 2, unit: 'thân', priority: 'HARD', colorIdx: 0 },
        { id: 'L02', name: 'Đạn C60', category: 'Đạn cối', totalItems: 36, itemsPerBox: 2, unit: 'thân', priority: 'HARD', colorIdx: 1 },
        { id: 'L03', name: 'Đạn L X', category: 'Vật liệu nổ', totalItems: 15, itemsPerBox: 2, unit: 'thân', priority: 'NORMAL', colorIdx: 2 },
      ]);

      const [grid, setGrid] = useState([]);
      const [overflowBoxes, setOverflowBoxes] = useState([]);
      const [isPacked, setIsPacked] = useState(false);

      // --- LOCAL STORAGE ---
      useEffect(() => {
        const savedData = localStorage.getItem(STORAGE_KEY);
        if (savedData) {
          try {
            const parsed = JSON.parse(savedData);
            if (parsed.config) setConfig(parsed.config);
            if (parsed.batches) setBatches(parsed.batches);
          } catch (e) { console.error("Lỗi đọc dữ liệu", e); }
        }
        
        if (typeof window !== 'undefined' && !window.XLSX) {
          const script = document.createElement('script');
          script.src = 'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
          script.async = true;
          document.head.appendChild(script);
        }
      }, []);

      useEffect(() => {
        localStorage.setItem(STORAGE_KEY, JSON.stringify({ config, batches }));
      }, [config, batches]);

      const touchStartX = useRef(null);
      
      useEffect(() => {
        const handleResize = () => setIsSidebarOpen(window.innerWidth >= 768);
        window.addEventListener('resize', handleResize);
        return () => window.removeEventListener('resize', handleResize);
      }, []);

      const handleTouchStart = (e) => { touchStartX.current = e.touches[0].clientX; };
      const handleTouchEnd = (e) => {
        if (touchStartX.current === null) return;
        const touchEndX = e.changedTouches[0].clientX;
        const diff = touchStartX.current - touchEndX;
        if (diff > 50 && isSidebarOpen) setIsSidebarOpen(false); 
        if (diff < -50 && !isSidebarOpen && touchStartX.current < 30) setIsSidebarOpen(true); 
        touchStartX.current = null;
      };

      // --- THUẬT TOÁN ĐIỀU PHỐI ---
      const generateRoute = (rows, cols, axis, direction, isSnake) => {
        const route = [];
        if (axis === 'col') {
          const cList = [];
          for (let c = 0; c < cols; c++) cList.push(direction === 'ltr' ? c : cols - 1 - c);
          cList.forEach((c, index) => {
            const topToBottom = isSnake ? (index % 2 === 0) : true;
            if (topToBottom) for (let r = 0; r < rows; r++) route.push({r, c});
            else for (let r = rows - 1; r >= 0; r--) route.push({r, c});
          });
        } else {
          const rList = [];
          for (let r = 0; r < rows; r++) rList.push(r);
          rList.forEach((r, index) => {
            const leftToRight = isSnake ? (index % 2 === 0) : true;
            const actualLTR = direction === 'ltr' ? leftToRight : !leftToRight;
            if (actualLTR) for (let c = 0; c < cols; c++) route.push({r, c});
            else for (let c = cols - 1; c >= 0; c--) route.push({r, c});
          });
        }
        return route;
      };

      const simulatePacking = (axis, direction, isSnake, allBoxesToPack) => {
        const tempGrid = Array(config.rows).fill(null).map(() => Array(config.cols).fill(null).map(() => ({ stack: [] })));
        const tempOverflow = [];
        const route = generateRoute(config.rows, config.cols, axis, direction, isSnake);
        let routeIdx = 0;

        allBoxesToPack.forEach(box => {
          let placed = false;
          while (routeIdx < route.length) {
            const {r, c} = route[routeIdx];
            if (tempGrid[r][c].stack.length < config.maxHeight) {
              tempGrid[r][c].stack.push(box);
              placed = true;
              break; 
            } else {
              routeIdx++; 
            }
          }
          if (!placed) tempOverflow.push(box);
        });
        return { grid: tempGrid, overflow: tempOverflow };
      };

      const runSmartPacking = () => {
        let allBoxes = [];
        batches.forEach(batch => {
          const perBox = batch.itemsPerBox || config.defaultItemsPerBox;
          const fullBoxesCount = Math.floor(batch.totalItems / perBox);
          const partialItems = batch.totalItems % perBox;
          
          const batchBoxes = Array(fullBoxesCount).fill({ ...batch, count: perBox, isPartial: false });
          if (partialItems > 0) batchBoxes.push({ ...batch, count: partialItems, isPartial: true });
          batchBoxes.forEach(box => allBoxes.push(box));
        });

        const priorityWeight = { 'HARD': 3, 'SOFT': 2, 'NORMAL': 1 };
        const orderedBatchIds = batches.map(b => b.id);
        const orderedCategories = [...new Set(batches.map(b => b.category))];

        allBoxes.sort((a, b) => {
          const catA = orderedCategories.indexOf(a.category);
          const catB = orderedCategories.indexOf(b.category);
          if (catA !== catB) return catA - catB; 

          if (priorityWeight[a.priority] !== priorityWeight[b.priority]) {
            return priorityWeight[b.priority] - priorityWeight[a.priority]; 
          }
          return orderedBatchIds.indexOf(a.id) - orderedBatchIds.indexOf(b.id); 
        });

        let finalGrid, finalOverflow;

        if (config.isManualRouting) {
          const result = simulatePacking(config.fillAxis, config.fillDirection, config.isSnakeRouting, allBoxes);
          finalGrid = result.grid;
          finalOverflow = result.overflow;
          setAutoChosenConfig(null);
        } else {
          const scenarios = [
            { axis: 'col', dir: 'ltr', snake: false, label: 'Cột Dọc (Trái qua)' },
            { axis: 'col', dir: 'rtl', snake: false, label: 'Cột Dọc (Phải qua)' },
            { axis: 'row', dir: 'ltr', snake: false, label: 'Ngang (Trái qua)' },
            { axis: 'row', dir: 'rtl', snake: false, label: 'Ngang (Phải qua)' },
            { axis: 'col', dir: 'ltr', snake: true, label: 'Cột Dọc (Trái qua) + Ziczac' },
            { axis: 'col', dir: 'rtl', snake: true, label: 'Cột Dọc (Phải qua) + Ziczac' },
            { axis: 'row', dir: 'ltr', snake: true, label: 'Ngang (Trái qua) + Ziczac' },
            { axis: 'row', dir: 'rtl', snake: true, label: 'Ngang (Phải qua) + Ziczac' }
          ];

          let bestResult = null; let bestScore = Infinity; let bestScenario = null;

          scenarios.forEach(scenario => {
            const res = simulatePacking(scenario.axis, scenario.dir, scenario.snake, allBoxes);
            let score = 0;
            const batchBounds = {};
            res.grid.forEach((row, r) => {
              row.forEach((cell, c) => {
                cell.stack.forEach(box => {
                  if (!batchBounds[box.id]) batchBounds[box.id] = { minR: r, maxR: r, minC: c, maxC: c };
                  batchBounds[box.id].minR = Math.min(batchBounds[box.id].minR, r);
                  batchBounds[box.id].maxR = Math.max(batchBounds[box.id].maxR, r);
                  batchBounds[box.id].minC = Math.min(batchBounds[box.id].minC, c);
                  batchBounds[box.id].maxC = Math.max(batchBounds[box.id].maxC, c);
                });
              });
            });
            
            Object.values(batchBounds).forEach(b => {
              score += (b.maxR - b.minR + 1) + (b.maxC - b.minC + 1); 
            });

            if (score < bestScore) {
              bestScore = score; bestResult = res; bestScenario = scenario;
            }
          });
          finalGrid = bestResult.grid; finalOverflow = bestResult.overflow; setAutoChosenConfig(bestScenario);
        }

        setGrid(finalGrid); setOverflowBoxes(finalOverflow); setIsPacked(true); setSelectedBatch(null);
        if (window.innerWidth < 768) setIsSidebarOpen(false);
      };

      useEffect(() => { runSmartPacking(); }, []); 

      // --- KÉO THẢ ---
      const handleDragStartList = (e, index) => { setDraggedItemIndex(index); e.dataTransfer.effectAllowed = 'move'; e.dataTransfer.setData('text/plain', index); };
      const handleDragOverList = (e, index) => {
        e.preventDefault();
        if (draggedItemIndex === null || draggedItemIndex === index) return;
        const newBatches = [...batches];
        const draggedItem = newBatches[draggedItemIndex];
        newBatches.splice(draggedItemIndex, 1);
        newBatches.splice(index, 0, draggedItem);
        setDraggedItemIndex(index);
        setBatches(newBatches);
      };
      const handleDragEndList = () => { setDraggedItemIndex(null); };

      const addBatch = () => {
        const newId = `L0${Date.now()}`;
        setBatches([...batches, { id: newId, name: `Lô Mới`, category: 'Khác', totalItems: 20, itemsPerBox: config.defaultItemsPerBox, unit: 'thân', priority: 'NORMAL', colorIdx: batches.length % BATCH_COLORS.length }]);
      };
      const removeBatch = (idToRemove) => { setBatches(batches.filter(b => b.id !== idToRemove)); setEditingBatch(null); };
      const saveEditedBatch = () => { setBatches(batches.map(b => b.id === editingBatch.id ? editingBatch : b)); setEditingBatch(null); };

      const getBreakdownText = (total, perBox, unit) => {
        const full = Math.floor(total / perBox);
        const partial = total % perBox;
        if (partial === 0) return `(${full} hòm chẵn)`;
        return `(${full} chẵn + 1 lẻ (${partial} ${unit}))`;
      };

      const handleBackup = () => {
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify({ config, batches }));
        const downloadAnchorNode = document.createElement('a');
        downloadAnchorNode.setAttribute("href", dataStr);
        downloadAnchorNode.setAttribute("download", `wms_backup_${new Date().toISOString().slice(0,10)}.json`);
        document.body.appendChild(downloadAnchorNode);
        downloadAnchorNode.click();
        downloadAnchorNode.remove();
      };

      const handleRestore = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (evt) => {
          try {
            const parsed = JSON.parse(evt.target.result);
            if (parsed.config && parsed.batches) {
              setConfig(parsed.config); setBatches(parsed.batches);
              alert("Phục hồi dữ liệu thành công!");
            } else alert("File backup không hợp lệ.");
          } catch (err) { alert("Lỗi đọc file backup."); }
        };
        reader.readAsText(file);
      };

      const handleForceUpdate = () => {
        if (window.confirm("Thao tác này sẽ tải lại bộ code mới nhất từ máy chủ. Bạn có muốn tiếp tục?")) {
          window.location.reload(true);
        }
      };

      const handleBoxClick = (batchId) => {
        setHoveredBatchId(batchId);
        const b = batches.find(x => x.id === batchId);
        if(b) setSelectedBatch(b);
      };

      const analyzeStack = (stack) => {
        if (stack.length === 0) return [];
        const groups = [];
        let currentBatch = stack[0].id;
        let count = 0;
        let hasPartial = false;

        stack.forEach(box => {
          if (box.id === currentBatch) {
            count++; if (box.isPartial) hasPartial = true;
          } else {
            groups.push({ ...stack[count-1], count, hasPartial });
            currentBatch = box.id; count = 1; hasPartial = box.isPartial;
          }
        });
        groups.push({ ...stack[stack.length-1], count, hasPartial });
        return groups.reverse(); 
      };

      const getCellBorders = (rIdx, cIdx) => {
        let classes = "border-r border-b border-gray-300"; 
        const stack = grid[rIdx][cIdx].stack;
        if (stack.length === 0) return classes;
        const topBox = stack[stack.length - 1];

        if (cIdx < config.cols - 1 && grid[rIdx][cIdx + 1].stack.length > 0 && grid[rIdx][cIdx + 1].stack[grid[rIdx][cIdx + 1].stack.length - 1].id !== topBox.id)
            classes = classes.replace('border-r border-gray-300', 'border-r-4 border-r-black z-10');
        if (rIdx < config.rows - 1 && grid[rIdx + 1][cIdx].stack.length > 0 && grid[rIdx + 1][cIdx].stack[grid[rIdx + 1][cIdx].stack.length - 1].id !== topBox.id)
            classes = classes.replace('border-b border-gray-300', 'border-b-4 border-b-black z-10');
        
        if (cIdx === 0) classes += " border-l-4 border-l-black";
        if (rIdx === 0) classes += " border-t-4 border-t-black";
        if (cIdx === config.cols - 1) classes += " border-r-4 border-r-black";
        if (rIdx === config.rows - 1) classes += " border-b-4 border-b-black";
        return classes;
      };

      const getGroupOpacity = (groupId) => {
        if (!hoveredBatchId) return 'opacity-100'; 
        return hoveredBatchId === groupId ? 'opacity-100 ring-2 ring-blue-500 z-50' : 'opacity-20 grayscale';
      };

      const [rot, setRot] = useState({ x: 60, z: -45 });
      const [isDragging3D, setIsDragging3D] = useState(false);
      const [dragStart, setDragStart] = useState({ mouseX: 0, mouseY: 0, rotX: 0, rotZ: 0 });

      const getClientXY = (e) => {
        if (e.touches && e.touches.length > 0) return { x: e.touches[0].clientX, y: e.touches[0].clientY };
        return { x: e.clientX, y: e.clientY };
      };
      const handlePointerDown = (e) => {
        if(e.target.closest('button') || e.target.closest('.batch-inspector')) return; 
        setIsDragging3D(true);
        const { x, y } = getClientXY(e);
        setDragStart({ mouseX: x, mouseY: y, rotX: rot.x, rotZ: rot.z });
      };
      const handlePointerMove = (e) => {
        if (!isDragging3D) return;
        const { x, y } = getClientXY(e);
        const deltaX = x - dragStart.mouseX;
        const deltaY = y - dragStart.mouseY;
        setRot({
          x: Math.max(-20, Math.min(100, dragStart.rotX - deltaY * 0.5)), 
          z: dragStart.rotZ + deltaX * 0.5
        });
      };
      const handlePointerUp = () => setIsDragging3D(false);


      return (
        <div 
          className="flex h-screen bg-gray-100 font-sans overflow-hidden relative" 
          onTouchStart={handleTouchStart} 
          onTouchEnd={handleTouchEnd}
          onMouseUp={handlePointerUp} 
          onMouseLeave={handlePointerUp}
        >
          
          <button onClick={() => setIsSidebarOpen(!isSidebarOpen)} className="md:hidden absolute top-4 left-4 z-50 p-2 bg-slate-900 text-white rounded-md shadow-lg">
            {isSidebarOpen ? <X size={20}/> : <Menu size={20}/>}
          </button>

          <div className={`absolute md:relative z-40 w-[360px] md:w-[420px] h-full bg-white border-r border-gray-200 flex flex-col shadow-[4px_0_24px_rgba(0,0,0,0.1)] md:shadow-lg transition-transform duration-300 ease-in-out ${isSidebarOpen ? 'translate-x-0' : '-translate-x-full md:translate-x-0'}`}>
            
            <div className="p-4 bg-slate-900 text-white flex items-center justify-between shrink-0">
              <div className="flex items-center gap-3">
                <Layers className="text-emerald-400" />
                <div>
                  <h1 className="font-bold text-lg leading-tight">WMS Optimizer V14</h1>
                  <p className="text-[10px] text-slate-400">PWA, Gestures & Category Grouping</p>
                </div>
              </div>
              <button className="md:hidden text-gray-400" onClick={() => setIsSidebarOpen(false)}><X size={20}/></button>
            </div>

            <div className="flex border-b shrink-0 bg-gray-50">
              <button onClick={() => setActiveTab('batches')} className={`flex-1 py-3 text-sm font-bold ${activeTab === 'batches' ? 'bg-white text-blue-600 border-b-2 border-blue-600' : 'text-gray-500 hover:bg-gray-100'}`}>Danh sách Lô</button>
              <button onClick={() => setActiveTab('config')} className={`flex-1 py-3 text-sm font-bold ${activeTab === 'config' ? 'bg-white text-blue-600 border-b-2 border-blue-600' : 'text-gray-500 hover:bg-gray-100'}`}>Cài đặt & App</button>
            </div>

            <div className="flex-1 overflow-y-auto custom-scrollbar relative bg-gray-50/30">
              
              {activeTab === 'config' && (
                <div className="p-4 space-y-4 animate-fadeIn pb-20">
                  <button onClick={runSmartPacking} className="w-full bg-blue-600 hover:bg-blue-700 text-white py-2.5 rounded-lg font-bold shadow-md flex items-center justify-center gap-2 transition-transform active:scale-95">
                    <RefreshCw size={16}/> Cập nhật sơ đồ mới
                  </button>

                  <div className="bg-white p-3 rounded border shadow-sm">
                    <h3 className="text-xs font-bold text-gray-800 uppercase mb-3 border-b pb-1">📐 Kích thước mặt sàn</h3>
                    <div className="grid grid-cols-2 gap-3">
                      <div>
                        <label className="block text-[10px] font-bold text-gray-500 uppercase">Số Cột ngang (X)</label>
                        <input type="number" className="w-full p-2 border rounded" value={config.cols} onChange={e => setConfig({...config, cols: Number(e.target.value)})} />
                      </div>
                      <div>
                        <label className="block text-[10px] font-bold text-gray-500 uppercase">Số Hàng dọc (Y)</label>
                        <input type="number" className="w-full p-2 border rounded" value={config.rows} onChange={e => setConfig({...config, rows: Number(e.target.value)})} />
                      </div>
                      <div className="col-span-2">
                        <label className="block text-[10px] font-bold text-gray-500 uppercase">Chiều cao tối đa (Hòm/Chồng)</label>
                        <input type="number" className="w-full p-2 border rounded border-blue-300 bg-blue-50 font-bold" value={config.maxHeight} onChange={e => setConfig({...config, maxHeight: Number(e.target.value)})} />
                      </div>
                    </div>
                  </div>

                  <div className="bg-white p-3 rounded border shadow-sm">
                    <h3 className="text-xs font-bold text-gray-800 uppercase mb-3 border-b pb-1">🧠 Điều phối (Luôn Xếp Đầy Chồng)</h3>
                    <button onClick={() => setConfig({...config, isManualRouting: !config.isManualRouting})} className={`w-full flex items-center justify-between p-3 rounded border-2 mb-3 transition-colors ${config.isManualRouting ? 'border-orange-500 bg-orange-50 text-orange-800' : 'border-blue-500 bg-blue-50 text-blue-800'}`}>
                      <div className="flex flex-col text-left">
                        <span className="font-bold text-sm">{config.isManualRouting ? 'Chế độ Thủ Công' : 'AI Tự Động Tối Ưu'}</span>
                        <span className="text-[10px]">{config.isManualRouting ? 'Ép xếp theo hướng bạn chọn' : 'AI tự tìm hướng vuông vức nhất'}</span>
                      </div>
                      {config.isManualRouting ? <CheckSquare size={20} className="text-orange-500"/> : <Activity size={20} className="text-blue-500"/>}
                    </button>

                    {config.isManualRouting && (
                      <div className="space-y-3 p-3 bg-gray-50 rounded border animate-fadeIn">
                        <div>
                          <label className="block text-[10px] font-bold text-gray-500 uppercase mb-1">Kiểu Nối Tiếp</label>
                          <div className="flex gap-2">
                            <button onClick={() => setConfig({...config, isSnakeRouting: true})} className={`flex-1 flex flex-col items-center justify-center py-2 rounded border text-[11px] font-bold transition-colors ${config.isSnakeRouting ? 'bg-orange-600 border-orange-700 text-white shadow-inner' : 'bg-white text-gray-500'}`}>Ziczac (Giữ Lô liền)</button>
                            <button onClick={() => setConfig({...config, isSnakeRouting: false})} className={`flex-1 flex flex-col items-center justify-center py-2 rounded border text-[11px] font-bold transition-colors ${!config.isSnakeRouting ? 'bg-orange-600 border-orange-700 text-white shadow-inner' : 'bg-white text-gray-500'}`}>Cắt ngang (Reset hàng)</button>
                          </div>
                        </div>
                        <div>
                          <label className="block text-[10px] font-bold text-gray-500 uppercase mb-1">Cố định trục xếp</label>
                          <div className="flex gap-2">

                      <div className="font-black text-sm text-gray-800">{getBreakdownText(selectedBatch.totalItems, selectedBatch.itemsPerBox, selectedBatch.unit)}</div>
                   </div>
                   <button onClick={() => { setSelectedBatch(null); setHoveredBatchId(null); }} className="text-gray-400 hover:text-gray-800 bg-gray-100 hover:bg-gray-200 p-2 rounded-full transition-colors"><X size={20}/></button>
                </div>
              </div>
            )}

          </div>

          <style dangerouslySetInnerHTML={{__html: `
            .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
            .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
            .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
            @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
            .animate-fadeIn { animation: fadeIn 0.2s ease-out forwards; }
            
            /* 3D Styles - KHỐI CHỮ NHẬT W=100, D=60, H=40 CÓ FULL 6 MẶT */
            .perspective-container { perspective: 2500px; overflow: hidden; }
            .isometric-grid {
               position: relative; transform-style: preserve-3d;
               transform: rotateX(var(--rotX)) rotateZ(var(--rotZ)) translate3d(-150px, 100px, -150px);
            }
            .isometric-grid:not(.dragging) { transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); }
            .isometric-grid.dragging { transition: none; } 

            .floor-tile {
               position: absolute; width: 100px; height: 60px;
               background: rgba(0, 0, 0, 0.03); border: 1px dashed rgba(0, 0, 0, 0.15);
               transform-style: preserve-3d;
            }
            .cube {
               position: absolute; width: 100px; height: 60px; transform-style: preserve-3d;
               transition: transform 0.2s ease-out, opacity 0.3s ease;
            }
            .cube:hover { transform: translate3d(var(--x), var(--y), calc(var(--z) + 5px)) !important; }
            .face { position: absolute; box-sizing: border-box; border: 1px solid rgba(0,0,0,0.15); }
            
            /* Cấu trúc 6 mặt của khối 100 x 60 x 40 */
            .bottom { width: 100px; height: 60px; transform: translateZ(0); }
            .top    { width: 100px; height: 60px; transform: translateZ(40px); }
            .back   { width: 100px; height: 40px; transform-origin: top left; transform: translate3d(0, 0, 40px) rotateX(-90deg); }
            .front  { width: 100px; height: 40px; transform-origin: top left; transform: translate3d(0, 60px, 40px) rotateX(-90deg); }
            .left   { width: 60px; height: 40px; transform-origin: top left; transform: translate3d(0, 0, 40px) rotateZ(90deg) rotateX(-90deg); }
            .right  { width: 60px; height: 40px; transform-origin: top left; transform: translate3d(100px, 0, 40px) rotateZ(90deg) rotateX(-90deg); }
          `}} />
        </div>
      );
    }

    // Render Component ra DOM
    const root = createRoot(document.getElementById('root'));
    root.render(<SmartPackingApp />);
  </script>
</body>
</html>
